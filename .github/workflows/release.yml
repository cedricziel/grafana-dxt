name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-upload:
    name: Build and Upload DXT Package
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dxt CLI
        run: npm install -g @anthropic-ai/dxt

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make curl jq unzip

      - name: Read version from VERSION file
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Using MCP server version: ${VERSION}"

      - name: Download all platform binaries
        run: make download-all-platforms

      - name: Validate manifest
        run: make validate

      - name: Build DXT package
        run: make package

      - name: Generate checksum
        run: |
          cd dist
          sha256sum grafana-dxt-${{ env.VERSION }}.dxt > grafana-dxt-${{ env.VERSION }}.dxt.sha256
          echo "Checksum generated:"
          cat grafana-dxt-${{ env.VERSION }}.dxt.sha256

      - name: Upload DXT package to release
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} ./dist/grafana-dxt-${{ env.VERSION }}.dxt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksum to release
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} ./dist/grafana-dxt-${{ env.VERSION }}.dxt.sha256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Release**: ${{ needs.release-please.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ env.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Package**: grafana-dxt-${{ env.VERSION }}.dxt" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $(ls -lh dist/grafana-dxt-${{ env.VERSION }}.dxt | awk '{print $5}')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SHA256 Checksum" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat dist/grafana-dxt-${{ env.VERSION }}.dxt.sha256 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
