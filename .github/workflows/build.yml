name: Build DXT

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build DXT Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dxt CLI
        run: npm install -g @anthropic-ai/dxt

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make curl unzip

      - name: Build DXT package
        run: make

      - name: Get versions
        run: |
          DXT_VERSION=$(grep -o '"version": *"[^"]*"' manifest.json | head -1 | sed 's/"version": *"//;s/"//')
          UPSTREAM_VERSION=$(cat UPSTREAM_VERSION)
          echo "DXT_VERSION=${DXT_VERSION}" >> $GITHUB_ENV
          echo "UPSTREAM_VERSION=${UPSTREAM_VERSION}" >> $GITHUB_ENV

      - name: Upload DXT artifact
        uses: actions/upload-artifact@v7
        with:
          name: grafana-dxt-${{ env.DXT_VERSION }}
          path: dist/grafana-dxt-*.dxt
          retention-days: 7

      - name: Print build info
        run: |
          echo "Build completed successfully!"
          echo "DXT extension version: ${{ env.DXT_VERSION }}"
          echo "Upstream mcp-grafana: ${{ env.UPSTREAM_VERSION }}"
          echo "Package: $(ls dist/*.dxt)"
          echo "Size: $(ls -lh dist/*.dxt | awk '{print $5}')"
